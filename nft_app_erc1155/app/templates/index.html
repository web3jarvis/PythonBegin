<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Marketplace</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">

    <div class="theme-switch-container">
        <button class="theme-btn" id="light-btn" onclick="setTheme('light')" title="Light Mode">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="5"></circle>
                <path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
            </svg>
        </button>
        <button class="theme-btn" id="dark-btn" onclick="setTheme('dark')" title="Dark Mode">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
    </div>

    <div class="card">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endwith %}
        <div class="logo">
            <h1>🪙 Welcome to NFT Marketplace</h1>
            <p>Create, manage and transfer NFTs on the blockchain</p>
        </div>
        <div class="index-buttons">
            <a href="{{ url_for('login') }}" class="btn-index btn-login">Login</a>
            <a href="{{ url_for('register') }}" class="btn-index btn-register">Register</a>
        </div>
    </div>

    <script>
        function setTheme(theme) {
            if (theme === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('light-btn').classList.add('active');
                document.getElementById('dark-btn').classList.remove('active');
            } else {
                document.body.classList.remove('light-mode');
                document.getElementById('dark-btn').classList.add('active');
                document.getElementById('light-btn').classList.remove('active');
            }
            localStorage.setItem('theme-choice', theme);
        }
        document.addEventListener('DOMContentLoaded', function() {
            setTheme(localStorage.getItem('theme-choice') || 'dark');
        });
    </script>
</body>
</html>
