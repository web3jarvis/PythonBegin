<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Token</title>
</head>
<body>

    <h1>Transfer Token</h1>
    <a href="/">Home</a>  |  
    <a href="/">Create Wallet</a>  |  
    <a href="/transfer">Transfer Token</a>
    <hr>
    <form method="POST" action="/transfer">

        <input type="text" name="sender_username" placeholder="Sender" required><br><br>
        <input type="text" name="recipient_username" placeholder="Recipient" required><br><br>
        <input type="number" name="amount" placeholder="Amount" required><br><br>

        <button type="submit">Send</button>
        
    </form>

</body>
</html>
