<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Token</title>
</head>
<body>
    <h1>Create a New Token</h1>
    <a href="/">Home</a>  |  
    <a href="/">Create Wallet</a>  |  
    <a href="/create_token">Create Token</a>  |  
    <a href="/transfer">Transfer Token</a>  |   
    <form method="GET" action="/dashboard_redirect" style="display:inline;">
        <input type="text" name="username" placeholder="Enter username">
        <button type="submit">Dashboard</button>
    </form>
    <hr>
    
    <form method="POST" action="/create_token" style="margin-top: 50px;">
        <input type="text" name="token_name" placeholder="Enter Token Name" required><br><br>
        <input type="text" name="token_symbol" placeholder="Enter Token Symbol" required><br><br>
        <input type="number" name="initial_supply" placeholder="Enter Initial Supply" required><br><br>
        <input type="text" name="token_owner" placeholder="Your Username" required><br><br>
        <button type="submit">Create Token</button>
    </form>
    
    {% if token_name %}
        <hr>
        <h2>New token created successfully!</h2>
        <p>Token Name: {{ token_name }}</p>
        <p>Token Symbol: {{ token_symbol }}</p>
        <p>Initial Supply: {{ initial_supply }}</p>
        <hr>
    {% endif %}
</body>
</html>
